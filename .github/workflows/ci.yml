# =============================================================================
# Lightweight, runner-free CI.
# -----------------------------------------------------------------------------
# All jobs run on stock GitHub-hosted `ubuntu-latest`: NO self-hosted runner and
# NO Garmin SDK download/config is required. The lint jobs need no Connect IQ SDK
# at all; the SDK-backed gates (`test` = compile every device `--unit-test`;
# `simulate` = actually RUN the (:test) suite headlessly) get the SDK by running
# the pre-built matco/connectiq-tester Docker IMAGE as the job `container`
# (SDK 9.2.0). Both are wired REQUIRED via `ci-required` (#42) -- though the YAML
# alone blocks nothing until branch protection requires the `ci-required` context
# on main (a repo-admin step). `traceability` stays advisory.
# =============================================================================
name: CI
on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'store/**'          # built store deliverable, not source
      - 'LICENSE'
  # NOTE: no paths-ignore on the PR trigger. A required check must post a status
  # on EVERY PR; a store/**-only or LICENSE-only PR that skipped the workflow
  # would leave `ci-required` pending forever under "require branches up to
  # date" and block merge. So the workflow always runs on PRs.
  pull_request: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read            # least privilege; nothing here writes to the repo

# Every `uses:` action is SHA-pinned with its claimed tag in a trailing comment.

jobs:
  # ------------------------------------------------------------- manifest lint
  # Gate-gap fix (review pt.5): the (deferred) compile+test path does NOT catch
  # the historical placeholder-app-id / store-rejection class, because a bad id
  # still compiles and still passes tests. This tiny runner-free check does.
  manifest-lint:
    name: Manifest app-id lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2
      - run: ./scripts/check_manifest_appid.sh

  # ------------------------------------------------- init-contract lint (adv)
  # ADVISORY (#131 — DEMOTED from ci-required). This lint's axiom —
  # "FitContributor.createField() is legal ONLY during initialize()" — was
  # **FALSIFIED on-device by #130**: createField raises the same uncatchable
  # `System Error: 'Failed invoking '` INSIDE initialize() too (the field renders
  # ZERO frames), so R1 mandated the fatal placement and, as a hard ci-required
  # gate, it was **green on a bricked build** (passing R1/R2 and bricking became the
  # same fact) and #117 wrongly marketed it as "the definitive confirmation this
  # class is fixed." Demoted to advisory so it no longer certifies a bricked tree as
  # green. It still RUNS and prints R1/R2 findings for diagnostics; the authoritative
  # net for this crash class is on-device (the boot-smoke #124/#128 dynamic net is
  # itself advisory and segfaults on the Linux sim). R1 will be re-scoped to a
  # guard-dominance rule (R1') once #130's mechanism is confirmed; R2
  # (.createField(-confined-to-FitLogger.mc) is a valid code-org rule and stays.
  init-contract:
    name: Init-contract lint (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2
      - run: python3 scripts/check_init_contract.py

  # ------------------------------------------------- compile (--unit-test) gate
  # SDK-backed compile gate. We run the pre-built matco/connectiq-tester Docker
  # IMAGE as the job `container` (rather than the matco/action-connectiq-tester
  # wrapper action) so it runs on a stock GitHub-hosted runner with NO self-hosted
  # runner and NO Garmin SDK download/config, while letting us pick the exact
  # compile command.
  #
  # WHAT THIS COVERS: compiles the `--unit-test` build (the BUILD.md test command,
  # `-w`) for EVERY device in manifest.xml. DETERMINISTIC (~7s each) and catches
  # the crash-class this project cares about: illegal-API-for-datafield
  # regressions, test-compilation breakage, and the monkeyc constant-folder crash
  # fixed in #9 -- across all supported devices, not just edge1050. Actually
  # RUNNING the `(:test)` functions is done by the SEPARATE `simulate` job below
  # (the #42 runtime gate -- now complete); the two are split so a simulator flake
  # can never mask a compile regression.
  #
  # NOTE: we deliberately do NOT pass `-l 3` (strict). This repo is intentionally
  # UNTYPED Monkey C; BUILD.md compiles with no `-l` (default level), which is
  # what we mirror here. We DO pass `-w` (warnings -> errors) so test-compile
  # warnings and illegal-API-in-datafield warnings fail the build.
  #
  # We compile all devices in ONE job (a shell loop) rather than a GitHub matrix
  # so the ~large SDK image is pulled ONCE, not once per device.
  #
  # REQUIRED (#42): in `ci-required.needs`, no continue-on-error. A --unit-test
  # compile failure on any device blocks merges. (If the pinned image ever breaks
  # in a way unrelated to our code, demote temporarily by restoring
  # continue-on-error / removing it from ci-required.needs.)
  test:
    name: Compile --unit-test, all devices
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # REQUIRED (#42): no continue-on-error; in ci-required.needs. A --unit-test
    # compile failure on any device now blocks merges.
    container:
      # Pinned by immutable digest for supply-chain safety. This digest is the
      # `v2.8.0` == `latest` build of ghcr.io/matco/connectiq-tester (Connect IQ
      # SDK 9.2.0, which ships ALL the device defs below). The digest IS the pin;
      # the tag in this comment is informational. Bump deliberately when adopting
      # a newer SDK.
      image: ghcr.io/matco/connectiq-tester@sha256:7a6f586cb0e0393ff288da09cf27b6dad40a0058a346c529b99fd0fc19858f0f   # v2.8.0 = SDK 9.2.0
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2
      - name: Compile --unit-test for every manifest device
        run: |
          set -eu
          # BUILD.md generates a throwaway developer key with these two openssl
          # commands; monkeyc requires a signing key even for a unit-test build.
          # It lives only in the runner workspace and is never committed.
          if ! command -v openssl >/dev/null 2>&1; then apt-get update && apt-get install -y openssl; fi
          openssl genrsa -out developer_key.pem 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER \
              -in developer_key.pem -out developer_key.der -nocrypt
          mkdir -p bin
          # Every product id in manifest.xml. Keep in sync when the product list
          # changes.
          rc=0
          for dev in edge1050 edge1040 edge840 edge540 edgeexplore2 fr965 fr955 fenix7x; do
            echo "== compiling --unit-test for $dev =="
            # EXACT BUILD.md unit-test compile command (see BUILD.md "Unit tests"),
            # plus -w (warnings -> errors).
            if monkeyc -f monkey.jungle -o "bin/FatigueMeter-test-$dev.prg" \
                 -y developer_key.der -d "$dev" --unit-test -w; then
              echo "OK: $dev"
            else
              echo "::error::--unit-test compile FAILED for $dev"; rc=1
            fi
          done
          [ "$rc" = 0 ] && echo "unit-test build OK (all devices)"
          exit "$rc"

  # ------------------------------------------------------------ run unit tests
  # Runtime gate (#42, REQUIRED): actually EXECUTE the (:test) functions, not just
  # compile.
  # SEPARATE from the compile gate so a simulator flake never masks a compile
  # regression. It compiles edge1050 --unit-test (pure/device-independent tests;
  # the compile job already covers all 8 devices), then runs it via
  # scripts/run_ciq_tests.sh, whose bounded simulator-READINESS PROBE + hard
  # `timeout` make it fail-FAST rather than hang the way the image's tester.sh
  # does (the failure that made #40's run unusable). The strict fail-closed
  # parser (scripts/check_ciq_tests.py) never trusts the runner exit code.
  #
  # PINNED VALUES (confirmed by the DIAGNOSTIC step over PR #43 runs 24 & 25):
  # the `connectiq` launcher forks `/connectiq/bin/simulator`, which LISTENs on
  # 0.0.0.0:1234 -> CIQ_SIM_PORT=1234, CIQ_SIM_PROC=simulator (defaults in
  # run_ciq_tests.sh). The one-time DIAGNOSTIC step has been REMOVED now that
  # those are pinned: it launched its own sim on display :98 and, although it
  # trapped cleanup of its Xvfb + launcher, the forked `simulator` CHILD survived
  # into the run step -- a stale, display-less sim that no longer listened on
  # :1234 yet kept `pgrep -f simulator` alive, so the run step's readiness probe
  # could never see :1234 come up and never tripped its liveness check (the exact
  # "diagnostic process leak" the #42 round-2 panel flagged). With the diagnostic
  # gone the run step launches the ONLY sim; run_ciq_tests.sh also pkills any
  # pre-existing sim at entry as a belt-and-suspenders guard.
  #
  # REQUIRED (#42): promoted after a confirmed genuinely-green run (single Xvfb/
  # sim, ran==passed==expected, failed==0, errors==0; 105/105). No continue-on-error;
  # in ci-required.needs. A test failure, a dropped count, or zero tests run now
  # blocks merges. NOTE: this executes a headless Qt sim -- if it ever flakes it
  # can block merges until re-run; re-run the job, and if a genuine flake pattern
  # emerges, revisit demoting it back to advisory.
  simulate:
    name: Run unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      # Same digest-pinned image as the compile gate (SDK 9.2.0). The digest IS
      # the pin; the tag comment is informational.
      image: ghcr.io/matco/connectiq-tester@sha256:7a6f586cb0e0393ff288da09cf27b6dad40a0058a346c529b99fd0fc19858f0f   # v2.8.0 = SDK 9.2.0
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2
      - name: Ensure tools present (guarded, like the compile job's openssl)
        run: |
          set -eux
          need() { command -v "$1" >/dev/null 2>&1; }
          if need openssl && need Xvfb && need xdpyinfo && need ss && need pgrep; then exit 0; fi
          apt-get update
          apt-get install -y openssl xvfb x11-utils iproute2 procps
      - name: Compile --unit-test (edge1050)
        run: |
          set -eux
          openssl genrsa -out developer_key.pem 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER \
              -in developer_key.pem -out developer_key.der -nocrypt
          mkdir -p bin
          monkeyc -f monkey.jungle -o bin/FatigueMeter-test.prg \
              -y developer_key.der -d edge1050 --unit-test
      - name: Run tests headlessly (readiness probe + hard timeout)
        run: bash scripts/run_ciq_tests.sh bin/FatigueMeter-test.prg edge1050
      - name: Upload sim run log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02   # v4.6.2
        with:
          name: sim-run-log
          path: sim-run.log

  # --------------------------------------------- release build + memory budget
  # REQUIRED (#91). Compiles the NON-`--unit-test` RELEASE artifact -- the build
  # that actually ships -- for every manifest device, plus the `.iq` store
  # package, so a data field that fails to COMPILE/LOAD or exceeds a device's
  # data-field STATIC image budget can no longer pass green (the #90 class). This
  # is the one build the other SDK jobs never produce: `test` and `simulate` both
  # pass `--unit-test`.
  #
  # WHAT THIS CATCHES (honest scope, per #91 panel):
  #   * a release-only compile / load failure (illegal-API-in-datafield on the
  #     REAL build, not the test build);
  #   * the compiler's data-field memory-budget ERROR -- `monkeyc` applies the
  #     target's data-field limit for `type=datafield` on any `-d <device>` build
  #     and exits NON-ZERO when the STATIC image (code + globals) exceeds it. That
  #     non-zero exit IS the assertion here (we do not merely log a size).
  # WHAT THIS DOES NOT CATCH: runtime PEAK-HEAP OOM (allocations during
  #   compute()/onUpdate) -- only the simulator's Active-Memory profiler / a real
  #   device measures that. That stays a docs/release-checklist.md item (the
  #   remaining #90 lever; see also #93's per-device construction-heap concern).
  #
  # NOTE on `-w` / warnings: `monkeyc -w` only RAISES warning verbosity -- it does
  # NOT make warnings fatal. This codebase is INTENTIONALLY UNTYPED, so monkeyc
  # emits benign "Cannot determine ... container type" notes across nearly every
  # file (the same reason CI avoids `-l 3`). So this gate does NOT fail on
  # warnings -- doing so would red every run on that inherent noise. It fails on a
  # NON-ZERO monkeyc exit: a compile error OR the data-field memory-budget error.
  # An illegal-datafield-API regression surfaces as a compile/permission ERROR
  # (non-zero exit), so it is still gated; warnings are logged for diagnostics
  # only. Same digest-pinned SDK image and throwaway-key pattern as `test`.
  release-build:
    name: Release build + data-field memory budget, all devices
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      # Same digest-pinned image as the compile/run gates (SDK 9.2.0). The digest
      # IS the pin; the tag comment is informational.
      image: ghcr.io/matco/connectiq-tester@sha256:7a6f586cb0e0393ff288da09cf27b6dad40a0058a346c529b99fd0fc19858f0f   # v2.8.0 = SDK 9.2.0
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2
      - name: Compile the RELEASE (.prg) for every device + package the .iq
        run: |
          set -eu
          # Throwaway signing key (workspace-only, never committed) -- monkeyc
          # needs a key even for a validation build. A store-SUBMITTABLE .iq needs
          # the account-bound developer key (a release-checklist step), which CI
          # deliberately lacks; this build validates COMPILE + BUDGET + PACKAGING,
          # not store signing.
          if ! command -v openssl >/dev/null 2>&1; then apt-get update && apt-get install -y openssl; fi
          openssl genrsa -out developer_key.pem 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER \
              -in developer_key.pem -out developer_key.der -nocrypt
          mkdir -p bin
          : > release-sizes.txt
          rc=0
          # edge1050 FIRST -- the primary target's failure leads the log.
          for dev in edge1050 edge1040 edge840 edge540 edgeexplore2 fr965 fr955 fenix7x; do
            echo "== release build for $dev =="
            log="build-$dev.log"
            # EXACT BUILD.md "Build" (release) command -- NO --unit-test -- plus -w.
            # Capture BOTH streams: the budget error and any WARNING go to stderr.
            if monkeyc -f monkey.jungle -o "bin/FatigueMeter-$dev.prg" \
                 -y developer_key.der -d "$dev" -w > "$log" 2>&1; then
              sz=$(wc -c < "bin/FatigueMeter-$dev.prg")
              # Warnings are NOT fatal (intentionally untyped codebase — see the
              # NOTE above); log the count for diagnostics only.
              wn=$(grep -c 'WARNING' "$log" || true)
              echo "OK: $dev  (${sz} bytes, ${wn} untyped warnings)"
              printf '%-14s %10d bytes  %4d warnings\n' "$dev" "$sz" "$wn" >> release-sizes.txt
            else
              # Non-zero exit = compile error OR data-field memory-budget error.
              echo "::error::release compile / data-field memory budget FAILED for $dev:"; cat "$log"
              rc=1
            fi
          done
          echo "== packaging store .iq (all devices) =="
          # `-e` exports the multi-device .iq -- the literal store-package format.
          # Building it from source every run proves the shipping package still
          # assembles and yields a CURRENT artifact, decoupled from the (possibly
          # stale) committed store/FatigueMeter.iq.
          if monkeyc -e -f monkey.jungle -o bin/FatigueMeter.iq \
               -y developer_key.der -w > build-iq.log 2>&1; then
            echo "OK: FatigueMeter.iq  ($(wc -c < bin/FatigueMeter.iq) bytes, $(grep -c 'WARNING' build-iq.log || true) untyped warnings)"
          else
            echo "::error::.iq package build FAILED:"; cat build-iq.log
            rc=1
          fi
          echo "---- release image sizes ----"; cat release-sizes.txt || true
          exit "$rc"
      - name: Upload release artifacts (per-device .prg + .iq + sizes)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02   # v4.6.2
        with:
          name: release-build
          path: |
            bin/FatigueMeter-*.prg
            bin/FatigueMeter.iq
            release-sizes.txt

  # ------------------------------------------------------- store freshness (adv)
  # ADVISORY (#91). A store-submittable `store/FatigueMeter.iq` must be signed with
  # the account-bound developer key, so CI (throwaway key, no `contents: write`)
  # can never regenerate the committed binary -- a byte-sync gate is infeasible.
  # This is therefore a FRESHNESS reminder, not a blocker: it emits a GitHub
  # ::warning:: (no red X) when source is newer than the committed store package,
  # so maintainers remember to regenerate + sign it at release (release-checklist).
  # Runner-free (no SDK). Needs full history for `git log`, hence fetch-depth: 0.
  store-staleness:
    name: Store package freshness (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2
        with:
          fetch-depth: 0
      - run: bash scripts/check_store_fresh.sh

  # ------------------------------------------------------ test-surface lint (adv)
  # ADVISORY (#92). Recurrence guard so the release build can't silently re-gain
  # test-only dead code: asserts every source/*Tests.mc module carries a
  # module-level `(:test)` (whole test surface stripped from release) and warns on
  # new un-annotated debug/fake/mock seams in shipping modules. Runner-free, no SDK.
  # Advisory for now (promote into ci-required.needs once proven false-positive-free).
  test-surface:
    name: Test-surface strip lint (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2
      - run: python3 scripts/check_test_surface.py

  # --------------------------------------------------------- traceability lint
  traceability:
    name: Constants <-> traceability (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true          # advisory until the matcher is hardened;
                                     # promote to a required check (add it to
                                     # `ci-required` needs) once it no longer
                                     # produces false positives.
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2
      - run: python3 scripts/check_traceability.py

  # ----------------------------------------------- boot-smoke gate (advisory)
  # ADVISORY (#124). Boots the REAL compiled DataField headlessly with `monkeydo`
  # WITHOUT `-t` (so the sim free-runs compute() at ~1 Hz) and hands the tick
  # stream + any CIQ_LOG.YML to the fail-closed parser. This reaches the dynamic
  # DataField-lifecycle crash classes the (:test) suite structurally cannot (the
  # View is unconstructable headless) — the #109/#114 Symbol-Not-Found and the
  # render-first ensureBuilt()-on-tick-1 recovery crash. NOT #116 (the sim can't
  # raise createField-off-init; that stays init-contract R1/R2 + on-device).
  #
  # ADVISORY-FIRST / go-no-go (#124 AC-1): this is a diagnostic on the pinned Linux
  # image. It is `continue-on-error` and OUT of `ci-required.needs`, and it DUMPS
  # the three go/no-go facts (a: does a no-`-t` boot free-run compute() >= K ticks;
  # b: does the sim write CIQ_LOG.YML on Linux; c: per-class crash-channel map) so
  # a human can (i) confirm the gate is real and (ii) calibrate the liveness floor
  # from the measured tick-rate before promotion. It is promoted to ci-required ONLY
  # after the AC-5 >=10-run RED/GREEN differential (see docs/connectiq-ci-setup.md).
  # If AC-1 shows the boot does NOT free-run on Linux, #124 is a documented dead-end
  # (no fake-green) — the advisory job simply reports FAIL and nothing is gated.
  boot-smoke:
    name: Boot-smoke (headless DataField boot, advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    container:
      # Same digest-pinned SDK 9.2.0 image as the other SDK jobs.
      image: ghcr.io/matco/connectiq-tester@sha256:7a6f586cb0e0393ff288da09cf27b6dad40a0058a346c529b99fd0fc19858f0f   # v2.8.0 = SDK 9.2.0
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2
      - name: Ensure tools present (guarded, like the simulate job)
        run: |
          set -eux
          need() { command -v "$1" >/dev/null 2>&1; }
          if need openssl && need Xvfb && need xdpyinfo && need ss && need pgrep; then exit 0; fi
          apt-get update
          apt-get install -y openssl xvfb x11-utils iproute2 procps
      - name: Build shipping .prg (monkey.jungle) + residue gate
        run: |
          set -eux
          openssl genrsa -out developer_key.pem 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER -in developer_key.pem -out developer_key.der -nocrypt
          mkdir -p bin
          # Shipping build uses the no-op BootSmoke stub (monkey.jungle) — the
          # FM_TICK literal must be provably absent from THIS -d .prg.
          monkeyc -f monkey.jungle -o bin/FatigueMeter-shipping.prg -y developer_key.der -d edge1050 -w
          bash scripts/check_boot_residue.sh bin/FatigueMeter-shipping.prg
      - name: Build boot-smoke .prg (monkey.bootsmoke.jungle)
        run: |
          set -eux
          # Boot-smoke build swaps in the FM_TICK-emitting BootSmoke variant.
          monkeyc -f monkey.bootsmoke.jungle -o bin/FatigueMeter-bootsmoke.prg -y developer_key.der -d edge1050 -w
      - name: Boot headlessly (no -t) + fail-closed verdict + AC-1 diagnostic
        run: bash scripts/run_boot_smoke.sh bin/FatigueMeter-bootsmoke.prg edge1050
      - name: Upload boot-smoke logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02   # v4.6.2
        with:
          name: boot-smoke-logs
          path: |
            boot-smoke.log
            boot-smoke-ciqlog.yml
            boot-smoke.rc
            sim-sim.log

  # -------------------------------------------------- required-check aggregator
  # Single stable status-check name to require in branch protection. Lists every
  # REQUIRED job; `init-contract` (#131), `traceability`, and `boot-smoke` stay
  # advisory and out of the set. If any needed job fails, this job is SKIPPED
  # (never "success"), so branch protection that requires the `ci-required`
  # context blocks the merge.
  #
  # BRANCH-PROTECTION CHECKLIST (repo admin, one-time -- the YAML alone enforces
  # nothing without it):
  #   * require the `ci-required` status check on `main` (strict / "up to date");
  #   * "Do not allow bypassing the above settings" / include administrators, or a
  #     red PR can still be admin-merged;
  #   * retire any STALE previously-required check name (e.g. an old
  #     "Run unit tests (advisory)" context) -- a required name that no longer
  #     posts a status blocks ALL merges forever.
  ci-required:
    name: ci-required
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [ manifest-lint, test, simulate, release-build ]
    steps:
      - run: echo "manifest lint + unit-test compile + unit-test run + release build all passed"
