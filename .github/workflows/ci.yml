# =============================================================================
# Lightweight, runner-free CI.
# -----------------------------------------------------------------------------
# All jobs run on stock GitHub-hosted `ubuntu-latest`: NO self-hosted runner and
# NO Garmin SDK download/config is required. The lint jobs need no Connect IQ SDK
# at all; the compile gate (`test`) gets the SDK by running the pre-built
# matco/connectiq-tester Docker IMAGE as the job `container` (SDK 9.2.0, edge1050)
# and compiles the `--unit-test` build. It is ADVISORY (`continue-on-error`);
# actually RUNNING the tests (monkeydo under xvfb) is a deferred follow-up.
# =============================================================================
name: CI
on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'store/**'          # built store deliverable, not source
      - 'LICENSE'
  # NOTE: no paths-ignore on the PR trigger. A required check must post a status
  # on EVERY PR; a store/**-only or LICENSE-only PR that skipped the workflow
  # would leave `ci-required` pending forever under "require branches up to
  # date" and block merge. So the workflow always runs on PRs.
  pull_request: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read            # least privilege; nothing here writes to the repo

# Every `uses:` action is SHA-pinned with its claimed tag in a trailing comment.

jobs:
  # ------------------------------------------------------------- manifest lint
  # Gate-gap fix (review pt.5): the (deferred) compile+test path does NOT catch
  # the historical placeholder-app-id / store-rejection class, because a bad id
  # still compiles and still passes tests. This tiny runner-free check does.
  manifest-lint:
    name: Manifest app-id lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2
      - run: ./scripts/check_manifest_appid.sh

  # ------------------------------------------------- compile (--unit-test) gate
  # SDK-backed compile gate. We run the pre-built matco/connectiq-tester Docker
  # IMAGE as the job `container` (rather than the matco/action-connectiq-tester
  # wrapper action) so it runs on a stock GitHub-hosted runner with NO self-hosted
  # runner and NO Garmin SDK download/config, while letting us pick the exact
  # compile command.
  #
  # WHY COMPILE-ONLY: this compiles the `--unit-test` build (the BUILD.md test
  # command, `-w`) for EVERY device in manifest.xml. That is DETERMINISTIC (~7s
  # each) and already catches the crash-class this project cares about:
  # illegal-API-for-datafield regressions, test-compilation breakage, and the
  # monkeyc constant-folder crash fixed in #9 -- across all supported devices,
  # not just edge1050. Actually RUNNING the `(:test)` functions (47 today, but the
  # gate self-computes the count from source, so this comment can't go stale) (monkeydo
  # under xvfb) is deferred: the image's `tester.sh` hangs because it has no
  # simulator-readiness probe (seen on #40's run). That work is tracked in #42
  # (bounded readiness probe -> run -> strict PASS/FAIL parse -> promote to
  # required).
  #
  # NOTE: we deliberately do NOT pass `-l 3` (strict). This repo is intentionally
  # UNTYPED Monkey C; BUILD.md compiles with no `-l` (default level), which is
  # what we mirror here. We DO pass `-w` (warnings -> errors) so test-compile
  # warnings and illegal-API-in-datafield warnings fail the build.
  #
  # We compile all devices in ONE job (a shell loop) rather than a GitHub matrix
  # so the ~large SDK image is pulled ONCE, not once per device.
  #
  # ADVISORY (`continue-on-error: true`, and NOT in `ci-required`'s `needs`): a
  # broken/mismatched image must not block merges. Promote to REQUIRED (add
  # `test` to `ci-required.needs`, drop `continue-on-error`) after it has a green
  # track record -- see #42.
  test:
    name: Compile --unit-test, all devices (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    container:
      # Pinned by immutable digest for supply-chain safety. This digest is the
      # `v2.8.0` == `latest` build of ghcr.io/matco/connectiq-tester (Connect IQ
      # SDK 9.2.0, which ships ALL the device defs below). The digest IS the pin;
      # the tag in this comment is informational. Bump deliberately when adopting
      # a newer SDK.
      image: ghcr.io/matco/connectiq-tester@sha256:7a6f586cb0e0393ff288da09cf27b6dad40a0058a346c529b99fd0fc19858f0f   # v2.8.0 = SDK 9.2.0
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2
      - name: Compile --unit-test for every manifest device
        run: |
          set -eu
          # BUILD.md generates a throwaway developer key with these two openssl
          # commands; monkeyc requires a signing key even for a unit-test build.
          # It lives only in the runner workspace and is never committed.
          if ! command -v openssl >/dev/null 2>&1; then apt-get update && apt-get install -y openssl; fi
          openssl genrsa -out developer_key.pem 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER \
              -in developer_key.pem -out developer_key.der -nocrypt
          mkdir -p bin
          # Every product id in manifest.xml. Keep in sync when the product list
          # changes.
          rc=0
          for dev in edge1050 edge1040 edge840 edge540 edgeexplore2 fr965 fr955 fenix7x; do
            echo "== compiling --unit-test for $dev =="
            # EXACT BUILD.md unit-test compile command (see BUILD.md "Unit tests"),
            # plus -w (warnings -> errors).
            if monkeyc -f monkey.jungle -o "bin/FatigueMeter-test-$dev.prg" \
                 -y developer_key.der -d "$dev" --unit-test -w; then
              echo "OK: $dev"
            else
              echo "::error::--unit-test compile FAILED for $dev"; rc=1
            fi
          done
          [ "$rc" = 0 ] && echo "unit-test build OK (all devices)"
          exit "$rc"

  # --------------------------------------------------- run unit tests (advisory)
  # Runtime gate (#42): actually EXECUTE the (:test) functions, not just compile.
  # SEPARATE from the compile gate so a simulator flake never masks a compile
  # regression. It compiles edge1050 --unit-test (pure/device-independent tests;
  # the compile job already covers all 8 devices), then runs it via
  # scripts/run_ciq_tests.sh, whose bounded simulator-READINESS PROBE + hard
  # `timeout` make it fail-FAST rather than hang the way the image's tester.sh
  # does (the failure that made #40's run unusable). The strict fail-closed
  # parser (scripts/check_ciq_tests.py) never trusts the runner exit code.
  #
  # PINNED VALUES (confirmed by the DIAGNOSTIC step over PR #43 runs 24 & 25):
  # the `connectiq` launcher forks `/connectiq/bin/simulator`, which LISTENs on
  # 0.0.0.0:1234 -> CIQ_SIM_PORT=1234, CIQ_SIM_PROC=simulator (defaults in
  # run_ciq_tests.sh). The one-time DIAGNOSTIC step has been REMOVED now that
  # those are pinned: it launched its own sim on display :98 and, although it
  # trapped cleanup of its Xvfb + launcher, the forked `simulator` CHILD survived
  # into the run step -- a stale, display-less sim that no longer listened on
  # :1234 yet kept `pgrep -f simulator` alive, so the run step's readiness probe
  # could never see :1234 come up and never tripped its liveness check (the exact
  # "diagnostic process leak" the #42 round-2 panel flagged). With the diagnostic
  # gone the run step launches the ONLY sim; run_ciq_tests.sh also pkills any
  # pre-existing sim at entry as a belt-and-suspenders guard.
  #
  # ADVISORY (`continue-on-error: true`, NOT in `ci-required.needs`). Promote to
  # REQUIRED only after the first run is confirmed genuinely green (single Xvfb/
  # sim, ran==passed==expected, failed==0, errors==0; 47/47 today) -- see #42.
  # Until then it can never wedge
  # `main`.
  simulate:
    name: Run unit tests (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    container:
      # Same digest-pinned image as the compile gate (SDK 9.2.0). The digest IS
      # the pin; the tag comment is informational.
      image: ghcr.io/matco/connectiq-tester@sha256:7a6f586cb0e0393ff288da09cf27b6dad40a0058a346c529b99fd0fc19858f0f   # v2.8.0 = SDK 9.2.0
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2
      - name: Ensure tools present (guarded, like the compile job's openssl)
        run: |
          set -eux
          need() { command -v "$1" >/dev/null 2>&1; }
          if need openssl && need Xvfb && need xdpyinfo && need ss && need pgrep; then exit 0; fi
          apt-get update
          apt-get install -y openssl xvfb x11-utils iproute2 procps
      - name: Compile --unit-test (edge1050)
        run: |
          set -eux
          openssl genrsa -out developer_key.pem 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER \
              -in developer_key.pem -out developer_key.der -nocrypt
          mkdir -p bin
          monkeyc -f monkey.jungle -o bin/FatigueMeter-test.prg \
              -y developer_key.der -d edge1050 --unit-test
      - name: Run tests headlessly (readiness probe + hard timeout)
        run: bash scripts/run_ciq_tests.sh bin/FatigueMeter-test.prg edge1050
      - name: Upload sim run log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02   # v4.6.2
        with:
          name: sim-run-log
          path: sim-run.log

  # --------------------------------------------------------- traceability lint
  traceability:
    name: Constants <-> traceability (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true          # advisory until the matcher is hardened;
                                     # promote to a required check (add it to
                                     # `ci-required` needs) once it no longer
                                     # produces false positives.
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2
      - run: python3 scripts/check_traceability.py

  # -------------------------------------------------- required-check aggregator
  # Single stable status-check name to require in branch protection. Only the
  # non-advisory jobs are in `needs`; `traceability` is advisory and stays out
  # of the required set.
  ci-required:
    name: ci-required
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [ manifest-lint ]
    steps:
      - run: echo "manifest lint passed"
